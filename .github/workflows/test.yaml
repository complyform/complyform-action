name: Test Action

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-action:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Validate action.yml syntax
        shell: bash
        run: python3 -c "import yaml; yaml.safe_load(open('action.yml'))"

      - name: Validate action.yml schema
        shell: bash
        run: |
          python3 -c "
          import yaml
          doc = yaml.safe_load(open('action.yml'))
          assert 'inputs' in doc, 'Missing inputs'
          assert 'outputs' in doc, 'Missing outputs'
          assert doc['runs']['using'] == 'composite', 'Not a composite action'
          assert len(doc['inputs']) == 14, f'Expected 14 inputs, got {len(doc[\"inputs\"])}'
          assert len(doc['outputs']) == 5, f'Expected 5 outputs, got {len(doc[\"outputs\"])}'
          for step in doc['runs']['steps']:
              if 'run' in step:
                  assert 'shell' in step, f'Step \"{step[\"name\"]}\" missing shell'
          print('action.yml schema validation passed')
          "
