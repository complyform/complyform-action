name: Test Action

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-action:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Validate action.yml syntax
        shell: bash
        run: python3 -c "import yaml; yaml.safe_load(open('action.yml'))"

      - name: Create test fixture
        shell: bash
        run: |
          cat > test-fixture.tfstate <<'EOF'
          {
            "version": 4,
            "terraform_version": "1.9.0",
            "serial": 1,
            "lineage": "test",
            "outputs": {},
            "resources": []
          }
          EOF

      - name: Dry-run action
        id: test
        uses: ./
        with:
          cloud: gcp
          state-path: ./test-fixture.tfstate
          fail-on-findings: 'false'

      - name: Verify outputs exist
        shell: bash
        run: |
          echo "Exit code: ${{ steps.test.outputs.exit-code }}"
          test -n "${{ steps.test.outputs.exit-code }}" || echo "Warning: exit-code output not set"
